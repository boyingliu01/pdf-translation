[pytest]
testpaths = test
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Exclude legacy standalone scripts that execute on import and call sys.exit
addopts =
    -v
    --ignore=test/test_final.py
    --ignore=test/example_usage.py
    --ignore=test/performance_test.py
    --ignore=test/test_translate_docs.py

# Async support
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Coverage target (uncomment after all tests pass)
# addopts += --cov=pdf_translator --cov=translate_pdf --cov-report=term-missing --cov-fail-under=80
